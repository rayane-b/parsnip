<!DOCTYPE html>
<html lang="en-ca">
<head>
    <script src="script.js"></script>

    <link href="//db.onlinewebfonts.com/c/4b57277e89dfdd30c9a6b69acaf78d3a?family=SF+Pro" rel="stylesheet"
          type="text/css"/>
    <link href="//db.onlinewebfonts.com/c/2fed949d780f40eb2e2f4374e4de8df5?family=SF+Pro+Display" rel="stylesheet"
          type="text/css"/>
    <link href="//db.onlinewebfonts.com/c/49cf9e586b122fd8b8cf67c4df697fb9?family=SF+Pro+Rounded" rel="stylesheet"
          type="text/css"/>


    <link href="style.css" rel="stylesheet" type="text/css">
    <meta charset="utf-8"/>

    <script crossorigin="anonymous" src="https://kit.fontawesome.com/873b3a52d9.js"></script>

    <title>parsnip</title>
    <link href="parsnip.png" rel="icon">
    <meta content="parsnip" property="og:title"/>
    <meta content="Quickly summarize any text or document." property="og:description"/>
    <meta content="https://github.com/rayane-b/parsnip/" property="og:url"/>
    <meta content="parsnip.png" property="og:image"/>
    <meta content="##fff891" data-react-helmet="true" name="theme-color"/>
    <meta content="summary_large_image" name="twitter:card">


</head>
<body>

<div>
    <img alt="" src="parsnip.png" style="scale: 50%">
</div>
<br>

<h1>parsnip</h1>
<br>
<h3> Quickly summarize any text or document. </h3>
<br>
<br>
<!-- <script src="sketch.js"></script> -->

<div class="wrapper" id="wrapper">
    <div class="column">

        <a class="upload-button" href="#">


            <div class="card">
                <div class="card-content">
                    <div class="container">
                        <div class="icon"><i class="fa-solid fa-file-pdf card-icon"></i></div>
                        <div class="text"><h3 class="card-title">Upload a PDF file</h3></div>
                        <div class="field">
                        </div>
                    </div>
                </div>
            </div>

            <br>

        </a>
        <div class="card">
            <div class="card-content">
                <div class="container">
                    <div class="icon"><i class="fa-solid fa-link card-icon"></i></div>
                    <div class="text"><h3 class="card-title">Paste a URL link</h3></div>
                    <div class="field">
                        <form action="/previewsettings.html">
                            <input class="input-text" id="pastURLField" name="field" placeholder="Insert your text here"
                                   type="text">
                            <input class="submit-input button" type="submit" value="🠊">
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <br>

        <div class="card">
            <div class="card-content">
                <div class="container">
                    <div class="icon"><i class="fa-solid fa-paste card-icon"></i></div>
                    <div class="text"><h3 class="card-title">Paste your text directly</h3></div>
                    <div class="field">
                        <form action="/previewsettings.html">
                            <input class="input-text" id="pastedTextField" name="field"
                                   placeholder="Insert your text here"
                                   type="text">
                            <input class="submit-input button" type="submit" value="🠊">
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<br><br><br><br>


</body>
</html>
